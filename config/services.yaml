# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    public_images_dir: '%kernel.project_dir%/%env(UPLOAD_DIR)%'
    images_dir: '/images'
    fixtures_images_dir: '%kernel.project_dir%/fixtures/images/'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $projectDir: '%kernel.project_dir%'
            $imagesDir: '%images_dir%'
            $publicImageDir: '%public_images_dir%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/Application/Commands/*'

    App\Fixtures\:
        resource: '../fixtures/*'

    App\Presentation\Action\:
        resource: '../src/Presentation/Action/*'
        tags: [ 'controller.service_arguments' ]

    App\Application\Handler\:
        resource: '../src/Application/Handler/*'
        tags: [ 'messenger.message_handler' ]

    App\Infrastructure\Symfony\Event\ExceptionEventListener:
        tags: [ 'kernel.event_listener' ]

    App\Infrastructure\Anthropic\Client\ImageDescriptionGenerator:
        arguments:
            $model: '%env(ANTHROPIC_MODEL)%'
            $maxTokens: 150

    Anthropic\Client:
        arguments:
            $apiKey: '%env(ANTHROPIC_API_KEY)%'
