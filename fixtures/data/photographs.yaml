    uuid: 7ba4aa84-bd8d-45ca-b324-d726db5e7de5
    title: 'Stilleven met gemberpot I'
    description: 'Het werk is geïnspireerd op de Franse schilder Paul Cézanne, die vormen uit de werkelijkheid vertaalde in geometrische vormen, zoals bollen, rechthoeken en cilinders.'
    filepath: '/images/7ba4aa84-bd8d-45ca-b324-d726db5e7de5.jpg'
