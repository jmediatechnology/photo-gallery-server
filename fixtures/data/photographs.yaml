-
    uuid: 7c45169a-6a7e-43a3-9ca2-8f7add1d0844
    title: 'Stilleven met gemberpot II'
    description: 'Het is een geabstraheerde versie van Stilleven met gemberpot I. Op Stilleven met gemberpot II zijn alle details vervangen door geometrische vormen, behalve de gemberpot, die het middelpunt vormt van een uitgebalanceerde compositie.'
    filepath: '/images/7c45169a-6a7e-43a3-9ca2-8f7add1d0844.jpg'
    createdAt: '2026-01-01 00:00:01'
    updatedAt: '2025-01-01 00:00:01'

-
    uuid: b931ecda-cb36-4937-9cfd-c3c01f80b60d
    title: 'Composition No. XVI'
    description: 'The composition shows typical features of Cubism, with the fragmenting of the contours and the dissolution of traditional perspective.'
    filepath: '/images/b931ecda-cb36-4937-9cfd-c3c01f80b60d.jpg'
    createdAt: '2026-01-01 00:00:02'
    updatedAt: '2025-01-01 00:00:02'

