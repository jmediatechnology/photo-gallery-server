    uuid: 90308019-a099-4fed-a109-c52a6694679e
    title: 'Ploughed Fields (''The Furrows'')'
    description: 'He was fairly satisfied with this landscape. In a letter to his brother, he wrote that Theo would like it too, because it was ''calmer than some other canvases''. He hoped that this quality would attract a buyer. But the painting was never sold.'
    filepath: '/images/90308019-a099-4fed-a109-c52a6694679e.jpg'
