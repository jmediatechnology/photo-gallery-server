-
    uuid: e985c4b9-5ae3-4d00-a692-7cdc5424a678
    title: 'Farmhouse in a Wheatfield'
    description: 'For this farmhouse in a field near Arles (FR), Van Gogh used bright, unmixed colours. This work illustrates what he had learned in Paris. There he had encountered a variety of new art movements, including Impressionism and Pointillism.'
    filepath: '/images/e985c4b9-5ae3-4d00-a692-7cdc5424a678.jpg'
    createdAt: '2025-10-02 02:00:00'
    updatedAt: '2025-10-02 02:00:00'

-
    uuid: 4e64e6cc-cea8-40b4-915b-64bee4dd3c27
    title: 'Veld met klaprozen'
    description: 'Het schilderij vertegenwoordigt een geïdealiseerde, groene en vruchtbare landelijke omgeving. Klaprozen in Van Goghs werk symboliseren vaak de overgang van openende bloei naar rijpheid, en soms de breekbaarheid van het leven.'
    filepath: '/images/4e64e6cc-cea8-40b4-915b-64bee4dd3c27.jpg'
    createdAt: '2025-10-02 02:00:00'
    updatedAt: '2025-10-02 02:00:00'

-
    uuid: ca9a5f76-a6d0-4ee6-8d77-4ee40bc6f124
    title: 'Almond Blossoms'
    description: 'He enjoyed them aesthetically and found joy in painting flowering trees. The works reflect the influence of Impressionism, Divisionism, and Japanese woodcuts. Almond Blossom was made to celebrate the birth of his nephew and namesake, son of his brother Theo and sister-in-law Jo.'
    filepath: '/images/ca9a5f76-a6d0-4ee6-8d77-4ee40bc6f124.jpg'
    createdAt: '2025-10-02 02:00:00'
    updatedAt: '2025-10-02 02:00:00'

-
    uuid: c654ccf3-da09-4773-9c00-a69dcea01b42
    title: 'Hospital in Arles'
    description: 'Hospital at Arles is the subject of two paintings that Vincent van Gogh made of the hospital in which he stayed in December 1888 and again in January 1889. The hospital is located in Arles in southern France.'
    filepath: '/images/c654ccf3-da09-4773-9c00-a69dcea01b42.jpg'
