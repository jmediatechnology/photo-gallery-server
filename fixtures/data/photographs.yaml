    uuid: 64c42be1-be68-471f-a114-3a2fa04cafa2
    title: 'Composition 10 in Black and White'
    description: 'This painting is considered a turning point in his journey toward abstraction. Although it has influence from the breakwater (the pier is the vertical lines, while the waves are horizontal), it is generally abstract. After this painting, Mondrian moved away from recognizable representations of nature and toward visual harmony.'
