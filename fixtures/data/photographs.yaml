  uuid: 87c8eed7-b65d-40cd-9526-87e3a30ad3d8
  title: 'The Potato Eaters'
  description: 'Vincent was painting the authentic, no-frills life of Dutch peasants. With its moody tones and earnest faces, this painting might not be the glitzy dinner party we’re used to, but it’s a hearty serving of reality.'
  filepath: '/images/87c8eed7-b65d-40cd-9526-87e3a30ad3d8.jpg'
  createdAt: '2025-10-02 02:00:00'
  updatedAt: '2025-10-02 02:00:00'

-
  uuid: 2adca6a7-57ff-4d65-99f2-e6a195fbf4f1
  title: 'De oogst'
  description: 'De oogst toont het boerenleven op de hooivelden van de dorre Crau-vlakte, tijdens een heldere zomerdag. Afgebeeld zijn de verschillende fasen van het oogsten. Het werk is opgebouwd in lagen. De essentie van het werk is echter de weergave van wat hij noemde het "zomerzon-effect" en de specifieke sfeer van de zomerdag. Hij maakt de zwoele hitte van de zon bijna voelbaar.'
  filepath: '/images/2adca6a7-57ff-4d65-99f2-e6a195fbf4f1.jpg'
  createdAt: '2025-10-02 02:00:00'
  updatedAt: '2025-10-02 02:00:00'

-
  uuid: e23017d4-1e01-42d9-bc5d-5342057d5a6d
  title: 'Het gele huis'
  description: 'Het raam op de eerste etage met de geopende luiken is Van Goghs logeerkamer waar zijn vriend de kunstschilder Paul Gauguin in oktober introk, toen zij het Atelier van het Zuiden wilden oprichten. Het raam met de gesloten luiken is Van Goghs eigen kamer, vereeuwigd in het schilderij De slaapkamer.'
  filepath: '/images/e23017d4-1e01-42d9-bc5d-5342057d5a6d.jpg'
  createdAt: '2025-10-02 02:00:00'
  updatedAt: '2025-10-02 02:00:00'

-
  uuid: 0b733b9d-82ef-4c89-a8da-ed9f4d9eea8e
  title: 'Het nachtcafé'
  description: 'Vandaag ga ik waarschijnlijk beginnen aan het interieur van het café waar ik logeer, ''s avonds bij gaslicht. Het is wat men hier een “nachtcafé” noemt (die zijn er genoeg hier) die de hele nacht door open blijven. De nachtbrakers kunnen er een toevlucht vinden, wanneer ze geen logement kunnen betalen of te dronken zijn om naar binnen te mogen.'
  filepath: '/images/0b733b9d-82ef-4c89-a8da-ed9f4d9eea8e.jpg'
  createdAt: '2025-10-02 02:00:00'
  updatedAt: '2025-10-02 02:00:00'

-
  uuid: 8618e652-21c6-45b8-bd1c-aa39634f7bef
  title: 'Korenveld met cipressen'
  description: 'Er bestaan drie versies van het schilderij, alle drie geschilderd in Saint-Rémy-de-Provence in 1889.'
  filepath: '/images/8618e652-21c6-45b8-bd1c-aa39634f7bef.jpg'
  createdAt: '2025-10-02 02:00:00'
  updatedAt: '2025-10-02 02:00:00'

-
  uuid: e538d2b6-8521-477c-8523-a40f381fc68b
  title: 'The Sower with Setting Sun'
  description: 'He painted this sower in the autumn of 1888. At the time, Van Gogh was working together with Paul Gauguin (1848-1903). Gauguin believed that in his work Van Gogh should draw less on reality and more on his imagination.'
  filepath: '/images/e538d2b6-8521-477c-8523-a40f381fc68b.jpg'
  createdAt: '2025-10-02 02:00:00'
  updatedAt: '2025-10-02 02:00:00'

-
  uuid: 68032dde-36ef-4440-9f54-d4cc086b8a95
  title: 'Fishing Boats on the Beach at Les Saintes-Maries-de-la-Mer'
  description: 'Can you see why these fishermen''s boats appear slightly unreal? Compared to the irregular surface of the sandy beach, they''ve been painted in an overly two-dimensional way. The boats are made up of areas of uniform colour within strong outlines. Furthermore, the boats don''t cast shadows on the beach. These stylistic elements were familiar to Van Gogh from his collection of Japanese prints.'
  filepath: '/images/68032dde-36ef-4440-9f54-d4cc086b8a95.jpg'
  createdAt: '2025-10-02 02:00:00'
  updatedAt: '2025-10-02 02:00:00'

-
  uuid: 559b6aaf-85ef-4011-b806-d7f17b10f6e4
  title: 'Sterrennacht boven de Rhône'
  description: 'Van Gogh schilderde Sterrennacht boven de Rhone kort na een avondwandeling, waarin hij volgens zijn eigen correspondentie een soort van mystieke samenhang ervoer van water, gras en lucht. In zijn weergave laat hij deze drie elementen dan ook samenvloeien tot een dynamisch geheel.'
  filepath: '/images/559b6aaf-85ef-4011-b806-d7f17b10f6e4.jpg'
  createdAt: '2025-10-02 02:00:00'
  updatedAt: '2025-10-02 02:00:00'

-
    uuid: 0617d8f8-0746-4fb6-bc1b-de9a77dd0964
    title: 'Laan bij Arles'
    description: 'De weg naar deze oude abdij legde de schilder op Laan bij Arles vast. Hij koos daarbij een opvallende compositie. De voorgrond wordt volledig in beslag genomen door een brede sloot. Deze leidt leidt het oog van de toeschouwer naar de typische Provençaalse weg met bomen en huizen die het linkerdeel van het asymmetrische schilderij vult.'
    filepath: '/images/0617d8f8-0746-4fb6-bc1b-de9a77dd0964.jpg'
    createdAt: '2025-10-02 02:00:00'
    updatedAt: '2025-10-02 02:00:00'

-
    uuid: c343b9cf-8020-4a13-bdc5-797397d6e5fa
    title: 'Entrance Gate to a Farm with Haystacks'
    description: 'Van Gogh mentioned the liveliness and interplay of "a wedding of two complementary colors, their mingling and opposition, the mysterious vibrations of two kindred souls."'
    filepath: '/images/c343b9cf-8020-4a13-bdc5-797397d6e5fa.jpg'
    createdAt: '2025-10-02 02:00:00'
    updatedAt: '2025-10-02 02:00:00'

